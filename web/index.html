<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HS Teacher Multi-Agent Demo</title>
    <style>
      :root {
        --bg: #07120d;
        --panel: #0b1711;
        --line: #173025;
        --text: #d9ffe8;
        --muted: #7eb396;
        --accent: #63ffa0;
        --warn: #ffd56b;
        --error: #ff8f8f;
        --shadow: 0 20px 80px rgba(0, 0, 0, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top, rgba(99, 255, 160, 0.12), transparent 30%),
          linear-gradient(180deg, #040907 0%, var(--bg) 100%);
        color: var(--text);
        font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      .shell {
        width: min(1180px, calc(100vw - 32px));
        margin: 24px auto;
        background: rgba(8, 18, 13, 0.96);
        border: 1px solid var(--line);
        border-radius: 18px;
        overflow: hidden;
        box-shadow: var(--shadow);
      }

      .titlebar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(18, 37, 28, 0.95), rgba(11, 23, 17, 0.95));
      }

      .lights {
        display: flex;
        gap: 8px;
      }

      .light {
        width: 12px;
        height: 12px;
        border-radius: 999px;
      }

      .light.red { background: #ff6d6d; }
      .light.yellow { background: #ffd66d; }
      .light.green { background: #69ff9f; }

      .title {
        font-size: 13px;
        color: var(--muted);
        letter-spacing: 0.04em;
      }

      .statusbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: flex-end;
      }

      .badge {
        border: 1px solid var(--line);
        color: var(--muted);
        padding: 5px 9px;
        border-radius: 999px;
        font-size: 12px;
      }

      .layout {
        display: grid;
        grid-template-columns: 330px 1fr;
        min-height: 78vh;
      }

      .sidebar {
        border-right: 1px solid var(--line);
        background: rgba(9, 18, 13, 0.88);
        padding: 18px;
      }

      .terminal {
        display: flex;
        flex-direction: column;
        min-height: 78vh;
      }

      .section-title {
        margin: 0 0 10px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
      }

      .section {
        margin-bottom: 18px;
      }

      .control,
      .prompt {
        width: 100%;
        background: #06100b;
        border: 1px solid var(--line);
        color: var(--text);
        border-radius: 12px;
        padding: 11px 12px;
        font: inherit;
      }

      .control:focus,
      .prompt:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(99, 255, 160, 0.12);
      }

      .hint {
        margin-top: 8px;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.5;
      }

      .toggle {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #06100b;
      }

      .toggle input {
        accent-color: var(--accent);
      }

      .examples {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .example {
        width: 100%;
        text-align: left;
        border: 1px solid var(--line);
        background: transparent;
        color: var(--text);
        border-radius: 12px;
        padding: 10px 12px;
        font: inherit;
        cursor: pointer;
        transition: border-color 0.15s ease, background 0.15s ease;
      }

      .example:hover {
        border-color: var(--accent);
        background: rgba(99, 255, 160, 0.06);
      }

      .screen {
        flex: 1;
        padding: 18px;
        overflow: auto;
      }

      .line {
        margin: 0 0 8px;
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.6;
      }

      .line.command {
        color: var(--accent);
      }

      .line.muted {
        color: var(--muted);
      }

      .line.warn {
        color: var(--warn);
      }

      .line.error {
        color: var(--error);
      }

      .block {
        margin: 18px 0;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(7, 16, 11, 0.72);
      }

      .block-title {
        margin: 0 0 10px;
        color: var(--accent);
        font-size: 13px;
      }

      .json,
      .answer,
      .evidence {
        margin: 0;
        font: inherit;
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.6;
      }

      .composer {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 10px;
        padding: 16px 18px 18px;
        border-top: 1px solid var(--line);
        background: rgba(9, 18, 13, 0.95);
      }

      .button {
        border: 1px solid var(--line);
        background: #0c1d14;
        color: var(--text);
        padding: 0 16px;
        border-radius: 12px;
        font: inherit;
        cursor: pointer;
      }

      .button.primary {
        background: linear-gradient(180deg, rgba(99, 255, 160, 0.16), rgba(11, 30, 20, 0.95));
        border-color: rgba(99, 255, 160, 0.4);
      }

      .button:hover {
        border-color: var(--accent);
      }

      .button:disabled {
        opacity: 0.55;
        cursor: wait;
      }

      @media (max-width: 980px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .composer {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="titlebar">
        <div class="lights">
          <span class="light red"></span>
          <span class="light yellow"></span>
          <span class="light green"></span>
        </div>
        <div class="title">hs-teacher-multi-agent-demo</div>
        <div class="statusbar" id="statusbar"></div>
      </div>

      <div class="layout">
        <aside class="sidebar">
          <div class="section">
            <h2 class="section-title">Model</h2>
            <input class="control" id="model" />
            <div class="hint">Use `openai/gpt-4o-mini` for the OpenAI-compatible path or `deepseek-chat` for DeepSeek.</div>
          </div>

          <div class="section">
            <h2 class="section-title">Agent Routing</h2>
            <select class="control" id="agent">
              <option value="">Auto route</option>
              <option value="regents_agent">Force Regents Agent</option>
              <option value="curriculum_agent">Force Curriculum Agent</option>
              <option value="college_support_agent">Force College Support Agent</option>
            </select>
          </div>

          <div class="section">
            <h2 class="section-title">Mode</h2>
            <label class="toggle">
              <input type="checkbox" id="use-rag" checked />
              <span>Use retrieval-augmented generation</span>
            </label>
          </div>

          <div class="section">
            <h2 class="section-title">Examples</h2>
            <div class="examples">
              <button class="example" data-query="What tools are allowed on the Algebra I January 2026 Regents exam?">Regents exam tools</button>
              <button class="example" data-query="What is the essential question in Grade 11 ELA Module 2?">ELA essential question</button>
              <button class="example" data-query="In Geometry Module 1, what are Lessons 1-2 about?">Geometry lessons 1-2</button>
              <button class="example" data-query="I'm in 11th grade and it's March. What should I do now for college applications?">College planning timeline</button>
              <button class="example" data-query="Give me a Regents-style Algebra I practice question about systems of equations.">Regents practice prompt</button>
            </div>
          </div>
        </aside>

        <main class="terminal">
          <div class="screen" id="screen"></div>

          <form class="composer" id="composer">
            <input
              class="prompt"
              id="query"
              autocomplete="off"
              placeholder="Ask the teacher assistant..."
            />
            <button class="button" type="button" id="clear">Clear</button>
            <button class="button primary" id="send" type="submit">Run</button>
          </form>
        </main>
      </div>
    </div>

    <script>
      const DEMO_CONFIG = __DEMO_CONFIG__;
      const screen = document.getElementById("screen");
      const composer = document.getElementById("composer");
      const queryInput = document.getElementById("query");
      const modelInput = document.getElementById("model");
      const agentInput = document.getElementById("agent");
      const ragInput = document.getElementById("use-rag");
      const sendButton = document.getElementById("send");
      const clearButton = document.getElementById("clear");
      const statusbar = document.getElementById("statusbar");

      function appendLine(text, className = "") {
        const p = document.createElement("p");
        p.className = `line ${className}`.trim();
        p.textContent = text;
        screen.appendChild(p);
        screen.scrollTop = screen.scrollHeight;
      }

      function appendBlock(title, content, className = "json") {
        const block = document.createElement("section");
        block.className = "block";
        const heading = document.createElement("h3");
        heading.className = "block-title";
        heading.textContent = title;
        const body = document.createElement("pre");
        body.className = className;
        body.textContent = content;
        block.appendChild(heading);
        block.appendChild(body);
        screen.appendChild(block);
        screen.scrollTop = screen.scrollHeight;
      }

      function formatEvidence(items) {
        if (!items.length) {
          return "No evidence returned.";
        }
        return items
          .map((item, index) => {
            return [
              `${String(index + 1).padStart(2, "0")}. ${item.doc_id}`,
              `    index=${item.retrieved_from} page=${item.page} score=${Number(item.score || 0).toFixed(3)}`,
              `    ${item.snippet || ""}`,
            ].join("\n");
          })
          .join("\n\n");
      }

      function setBusy(isBusy) {
        sendButton.disabled = isBusy;
        clearButton.disabled = isBusy;
        queryInput.disabled = isBusy;
        modelInput.disabled = isBusy;
        agentInput.disabled = isBusy;
        ragInput.disabled = isBusy;
        sendButton.textContent = isBusy ? "Running..." : "Run";
      }

      function renderStatus() {
        const badges = [
          `default=${DEMO_CONFIG.defaultModel}`,
          `embed=${DEMO_CONFIG.gpuEnabled ? "cuda" : "cpu"}`,
          `backends=${DEMO_CONFIG.reasoningBackends.join(",") || "none"}`,
          `topk=${DEMO_CONFIG.finalK}`,
        ];
        statusbar.innerHTML = "";
        for (const value of badges) {
          const span = document.createElement("span");
          span.className = "badge";
          span.textContent = value;
          statusbar.appendChild(span);
        }
      }

      async function runQuery(query) {
        appendLine(`$ query --model "${modelInput.value}" ${ragInput.checked ? "--rag" : "--no-rag"} ${agentInput.value ? `--agent ${agentInput.value}` : "--route auto"}`, "command");
        appendLine(`> ${query}`);
        appendLine("Processing request...", "muted");

        const response = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            query,
            model: modelInput.value,
            use_rag: ragInput.checked,
            forced_agent: agentInput.value || null,
          }),
        });

        const payload = await response.json();
        screen.lastChild?.remove();

        if (!response.ok) {
          appendLine(`Error: ${payload.error || "Unknown server error."}`, "error");
          return;
        }

        appendLine(`route=${payload.agent} confidence=${payload.route?.confidence ?? "n/a"}`, "muted");
        appendBlock("Answer", payload.answer || "No answer returned.", "answer");
        appendBlock("Routing", JSON.stringify(payload.route || {}, null, 2));
        appendBlock("Retrieval Plan", JSON.stringify(payload.retrieval_plan || {}, null, 2));
        appendBlock("Rewrites", (payload.rewrites || []).join("\n") || "No rewrites.", "json");
        appendBlock("Top Evidence", formatEvidence(payload.top_evidence || []), "evidence");
      }

      composer.addEventListener("submit", async (event) => {
        event.preventDefault();
        const query = queryInput.value.trim();
        if (!query) {
          return;
        }

        setBusy(true);
        try {
          await runQuery(query);
          queryInput.value = "";
        } finally {
          setBusy(false);
          queryInput.focus();
        }
      });

      clearButton.addEventListener("click", () => {
        screen.innerHTML = "";
        boot();
      });

      document.querySelectorAll(".example").forEach((button) => {
        button.addEventListener("click", () => {
          queryInput.value = button.dataset.query;
          queryInput.focus();
        });
      });

      function boot() {
        appendLine("HS Teacher Multi-Agent demo ready.", "muted");
        appendLine("Use the controls on the left, then run a query.", "muted");
        appendLine("RAG mode will show routing, retrieval plan, rewrites, and top evidence.", "muted");
      }

      modelInput.value = DEMO_CONFIG.defaultModel;
      renderStatus();
      boot();
      queryInput.focus();
    </script>
  </body>
</html>
